# VMware AVI Configuration
# Copy to ~/.vmware-avi/config.yaml and edit

controllers:
  - name: prod-avi
    host: avi-controller.example.com
    username: admin
    # Set password via env: export PROD_AVI_PASSWORD=xxx
    # The username above can also come from the environment:
    #   export PROD_AVI_USERNAME=svc-account
    # Set both when a secret store supplies the pair — they resolve together,
    # so rotating one without the other cannot happen.
    api_version: "22.1.4"
    tenant: admin
    port: 443
    # verify_ssl: true is the default (v1.5.15+). AVI Controllers commonly ship
    # with self-signed certs — set to false explicitly for those environments.
    verify_ssl: true
    # Optional label for this controller. An environment-scoped 'deny' rule in
    # ~/.vmware/rules.yaml can match on it — e.g. freeze writes on 'production'.
    # A controller with no label is simply not matched by such a rule.
    environment: production

  # Add more controllers as needed:
  # - name: staging-avi
  #   host: avi-staging.example.com
  #   username: admin
  #   environment: staging

# Which controller to use by default
default_controller: prod-avi

# AKO (Avi Kubernetes Operator) settings
ako:
  # Path to kubeconfig (default: ~/.kube/config)
  kubeconfig: ~/.kube/config
  # Default K8s context (leave empty to use current-context)
  default_context: ""
  # Namespace where AKO is deployed
  namespace: avi-system
